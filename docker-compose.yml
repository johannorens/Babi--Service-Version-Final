name: babi-service-v2

services:
  mysql:
    image: mysql:8.0
    container_name: babi_mysql_V2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: babiservice
      MYSQL_USER: babiuser
      MYSQL_PASSWORD: babipass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - babi_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "babiuser", "-pbabipass"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build:
      context: ./babi
      dockerfile: Dockerfile
    container_name: babi_back_V2
    restart: unless-stopped
    volumes:
      - ./babi:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - "8000:8000"
    env_file:
      - ./babi/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - babi_network

  front:
    build:
      context: ./front/mon-app-react
      dockerfile: Dockerfile
    container_name: babi_front_V2
    restart: unless-stopped
    volumes:
      - ./front/mon-app-react:/app
      - node_modules_data:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - back
    networks:
      - babi_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: babi_phpmyadmin_V2
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: babiuser
      PMA_PASSWORD: babipass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - babi_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: babi_cadvisor_V2
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - babi_network

  prometheus:
    image: prom/prometheus:latest
    container_name: babi_prometheus_V2
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - babi_network
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana:latest
    container_name: babi_grafana_V2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - babi_network
    depends_on:
      - prometheus

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: babi_mysqld_exporter_V2
    restart: unless-stopped
    command:
      - "--config.my-cnf=/cfg/.my.cnf"
    volumes:
      - ./monitoring/.my.cnf:/cfg/.my.cnf:ro
    ports:
      - "9104:9104"
    networks:
      - babi_network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  babi_network:
    driver: bridge

volumes:
  mysql_data:
    name: babiservice2_mysql_data
  vendor_data:
  node_modules_data:
  prometheus_data:
  grafana_data: